name: SG Radar daily update

on:
  schedule:
    - cron: "0 1 * * *"   # 01:00 UTC = 09:00 SGT, daily
  workflow_dispatch:       # manual trigger from the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sg-radar-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run pipeline (scrape 8 sources -> normalize -> render)
        env:
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m src.pipeline

      - name: Commit history DB and site back to repo
        run: |
          git config user.name "sg-radar-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tracker.db site/index.html
          git diff --cached --quiet || git commit -m "data: daily update $(date -u +%F)"
          git push

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
